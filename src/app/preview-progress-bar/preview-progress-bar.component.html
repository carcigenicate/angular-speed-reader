<div class="position-relative">
  <p-progress-bar
    class="w-100 fast-update-progress-bar"
    [value]="(currentWordIndex() / (words().length - 1)) * 100"
    [showValue]="false"
    [style.border-radius.px]="0"
    [style.height.px]="height()"
    (click)="progressBarClicked($event)"
    (mousemove)="progressBarMousedOver($event)"
    (mouseleave)="progressBarMousedLeave($event)"
  />
